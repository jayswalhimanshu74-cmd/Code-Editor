spring.application.name=Code-Editor

# Server
server.port=8080

# PostgreSQL ? values loaded from .env.properties (git-ignored)
spring.config.import=optional:file:.env.properties
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# JWT ? loaded from .env.properties 
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiry=900000
app.jwt.refresh-token-expiry=604800000

# CORS
app.cors.allowed-origins=http://localhost:5173

# Piston API
jdoodle.api.url=https://api.jdoodle.com/v1/execute
jdoodle.client.id=${JDOODLE_CLIENT_ID}
jdoodle.client.secret=${JDOODLE_CLIENT_SECRET}

# Gemini API for AI chat
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Redis Configuration (For STOMP Pub/Sub Backplane)
spring.data.redis.host=${UPSTASH_REDIS_URL}
spring.data.redis.port=${UPSTASH_REDIS_PORT}
spring.data.redis.password=${UPSTASH_REDIS_PASSWORD}
spring.data.redis.ssl.enabled=true


# OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_OAUTH_CLIENT_ID:dummy-google-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET:dummy-google-secret}
spring.security.oauth2.client.registration.google.scope=profile,email

spring.security.oauth2.client.registration.github.client-id=${GITHUB_OAUTH_CLIENT_ID:dummy-github-id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_OAUTH_CLIENT_SECRET:dummy-github-secret}
spring.security.oauth2.client.registration.github.scope=user:email,read:user

# GitHub Token Encryption
github.token.encryption.key=${GITHUB_TOKEN_ENCRYPTION_KEY:12345678901234567890123456789012}

# STOMP / Message Broker Configuration
# Note: Switch enableSimpleBroker to enableStompBrokerRelay pointing at ActiveMQ or RabbitMQ before deploying to multi-instance production.
spring.activemq.broker-url=${ACTIVEMQ_BROKER_URL:vm://localhost?broker.persistent=false}

# Admin configuration
admin.bootstrap.secret=${ADMIN_BOOTSTRAP_SECRET:changeme}
