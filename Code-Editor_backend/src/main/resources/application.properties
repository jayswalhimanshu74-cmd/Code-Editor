spring.application.name=Code-Editor

# Server
server.port=8080

# PostgreSQL ? values loaded from .env.properties (git-ignored)
spring.config.import=optional:file:.env.properties
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}

spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT ? loaded from .env.properties 
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiry=900000
app.jwt.refresh-token-expiry=604800000

# CORS
app.cors.allowed-origins=http://localhost:5173

# Piston API
jdoodle.api.url=https://api.jdoodle.com/v1/execute
jdoodle.client.id=${JDOODLE_CLIENT_ID}
jdoodle.client.secret=${JDOODLE_CLIENT_SECRET}

# Gemini API for AI chat
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent